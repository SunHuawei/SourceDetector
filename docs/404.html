<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | Source Detector</title>
    <meta name="description" content="The requested page could not be found on the Source Detector website." />
    <meta name="robots" content="noindex" />
    <style>
      :root {
        --bg: #0b1020;
        --panel: #131a2a;
        --text: #eef2ff;
        --muted: #a7b0c5;
        --line: #24314d;
        --accent: #6ea8fe;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #0b1020 0%, #10172a 100%);
        color: var(--text);
      }
      .wrap { width: min(760px, 92vw); padding: 20px; }
      .card {
        background: rgba(19,26,42,.78);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 26px;
        box-shadow: 0 10px 35px rgba(0,0,0,.22);
      }
      h1 { margin: 0 0 12px; font-size: clamp(30px, 4vw, 44px); }
      p { margin: 0 0 14px; color: #d8e0f6; }
      .muted { color: var(--muted); }
      .links { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid var(--line);
        text-decoration: none;
        color: var(--text);
      }
      .btn-primary { background: var(--accent); border-color: transparent; color: #07101f; font-weight: 600; }
      .meta-links { margin-top: 12px; font-size: 14px; }
      .meta-links a { color: var(--accent); text-decoration: none; }
      .meta-links a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>404</h1>
        <p>The page you are looking for does not exist or has moved.</p>
        <p class="muted">Use one of the entry points below to continue browsing Source Detector content.</p>
        <div class="links">
          <a class="btn btn-primary" href="./">Back to English Home</a>
          <a class="btn" href="./zh/">简体中文入口</a>
          <a class="btn" href="./ja/">日本語入口</a>
          <a class="btn" href="./privacy/">Privacy</a>
        </div>
        <p class="meta-links">
          <a href="https://github.com/SunHuawei/SourceDetector/blob/main/docs/README.md">Docs</a>
          · <a href="./faq/">FAQ</a>
        </p>
      </section>
    </main>
  </body>
</html>
